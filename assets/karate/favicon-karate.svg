<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Favicon Aura Karatê — réplica do selo da marca renderizada em
    components/karate/KarateShell.tsx (styles.brandMark / brandMarkSeal):
    quadrado arredondado com gradiente oxblood (150deg, #c0503f → #983429),
    borda rgba(43,38,32,0.14) e o kanji 空 em #fbeee4 (ShojiPalette / KarateColors).
  -->
  <defs>
    <linearGradient id="brandMarkGrad" x1="14%" y1="0%" x2="86%" y2="100%">
      <stop offset="0%" stop-color="#c0503f" />
      <stop offset="100%" stop-color="#983429" />
    </linearGradient>
  </defs>
  <rect
    x="1" y="1" width="62" height="62" rx="15"
    fill="url(#brandMarkGrad)"
    stroke="rgba(43,38,32,0.14)"
    stroke-width="1.5"
  />
  <text
    x="32" y="45"
    text-anchor="middle"
    font-family="'Shippori Mincho','Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif"
    font-size="38"
    fill="#fbeee4"
  >空</text>
</svg>
